server:
  port: ${PORT:8081}

spring:
  application:
    name: togomovie-ai

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    locations: classpath:db/migration
    table: flyway_schema_history_ai

  cache:
    type: simple

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: false   # managed by Flyway

    mcp:
      server:
        name: togomovie-mcp
        version: 1.0.0
        type: SYNC

# togomovie-backend base URL
backend:
  base-url: ${BACKEND_URL:http://localhost:8080}

# Internal API key — backend and AI service share this secret
internal:
  api-key: ${INTERNAL_API_KEY:changeme-dev-key}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.togomovie: DEBUG
    org.springframework.ai: INFO
